<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Moritz Portfolio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0a0a0f; --bg2: #13131a; --bg3: #1a1a24; --text: #e2e2e8; --muted: #71717a; --border: #2e2e3a; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(124,58,237,0.12) 0%, transparent 70%); pointer-events: none; }
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 420px; position: relative; }
    .logo { text-align: center; margin-bottom: 2rem; }
    .logo h1 { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #a78bfa, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .logo p { color: var(--muted); font-size: 0.9rem; margin-top: 0.3rem; }
    .tabs { display: flex; gap: 0; margin-bottom: 2rem; background: var(--bg3); border-radius: 10px; padding: 4px; }
    .tab { flex: 1; padding: 8px; border: none; background: transparent; color: var(--muted); border-radius: 8px; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
    .tab.active { background: var(--bg2); color: var(--text); font-weight: 600; }
    .form-group { margin-bottom: 1.1rem; }
    .form-group label { display: block; font-size: 0.82rem; color: var(--muted); margin-bottom: 0.35rem; }
    .form-group input { width: 100%; padding: 11px 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg3); color: var(--text); font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
    .form-group input:focus { border-color: #7c3aed; }
    .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; background: linear-gradient(135deg, #7c3aed, #2563eb); color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; margin-top: 0.5rem; }
    .btn:hover { opacity: 0.88; }
    .msg { margin-top: 1rem; padding: 10px 14px; border-radius: 8px; font-size: 0.88rem; display: none; }
    .msg.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #f87171; }
    .msg.success { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); color: #4ade80; }
    .step { display: none; }
    .step.active { display: block; }
    .totp-input { text-align: center; font-size: 2rem; font-weight: 700; letter-spacing: 0.5rem; padding: 14px; }
    .hint { color: var(--muted); font-size: 0.82rem; text-align: center; margin-top: 0.75rem; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>Moritz</h1>
    <p>Portfolio & Dashboard</p>
  </div>
  <div class="step active" id="step-auth">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Login</button>
      <button class="tab" onclick="switchTab('register')">Registrieren</button>
    </div>
    <div id="form-login">
      <div class="form-group"><label>Benutzername</label><input type="text" id="l-user" placeholder="dein_username"/></div>
      <div class="form-group"><label>Passwort</label><input type="password" id="l-pass" placeholder="••••••••"/></div>
      <button class="btn" onclick="login()">Einloggen</button>
    </div>
    <div id="form-register" style="display:none;">
      <div class="form-group"><label>Benutzername</label><input type="text" id="r-user" placeholder="dein_username"/></div>
      <div class="form-group"><label>E-Mail</label><input type="email" id="r-email" placeholder="deine@email.com"/></div>
      <div class="form-group"><label>Passwort (min. 8 Zeichen)</label><input type="password" id="r-pass" placeholder="••••••••"/></div>
      <div class="form-group"><label>Passwort wiederholen</label><input type="password" id="r-pass2" placeholder="••••••••"/></div>
      <button class="btn" onclick="register()">Registrieren</button>
    </div>
    <div class="msg" id="msg-auth"></div>
  </div>
  <div class="step" id="step-2fa">
    <div class="logo">
      <p style="font-size:2rem;">&#128272;</p>
      <h2 style="margin-top:0.5rem; font-size:1.2rem;">2-Faktor-Authentifizierung</h2>
    </div>
    <div class="form-group" style="margin-top:1.5rem;">
      <label style="text-align:center; display:block;">Code aus Google Authenticator</label>
      <input type="text" id="totp-code" class="totp-input" placeholder="000000" maxlength="6" inputmode="numeric" oninput="if(this.value.length===6) login2fa()"/>
    </div>
    <button class="btn" onclick="login2fa()">Bestaetigen</button>
    <p class="hint">Oeffne die Google Authenticator App und gib den 6-stelligen Code ein.</p>
    <div class="msg" id="msg-2fa"></div>
  </div>
</div>
<script>
  const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
    ? 'http://localhost:8000'
    : 'https://DEIN-TUNNEL-URL.trycloudflare.com';
  let pendingUser = null, pendingPass = null;
  function switchTab(tab) {
    document.getElementById('form-login').style.display    = tab==='login'    ? 'block' : 'none';
    document.getElementById('form-register').style.display = tab==='register' ? 'block' : 'none';
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0)===(tab==='login')));
    showMsg('msg-auth','','');
  }
  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text; el.className = 'msg '+type; el.style.display = text ? 'block' : 'none';
  }
  async function login() {
    const user = document.getElementById('l-user').value.trim();
    const pass = document.getElementById('l-pass').value;
    if (!user || !pass) return showMsg('msg-auth','Bitte alle Felder ausfullen.','error');
    try {
      const res = await fetch(API+'/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username:user, password:pass}) });
      const data = await res.json();
      if (!res.ok) {
        if (data.detail === '2FA-Code erforderlich') {
          pendingUser = user; pendingPass = pass;
          document.getElementById('step-auth').classList.remove('active');
          document.getElementById('step-2fa').classList.add('active');
        } else { showMsg('msg-auth', data.detail||'Fehler beim Login','error'); }
        return;
      }
      localStorage.setItem('token', data.token);
      localStorage.setItem('username', data.username);
      window.location.href = 'index.html';
    } catch(e) { showMsg('msg-auth','Server nicht erreichbar','error'); }
  }
  async function login2fa() {
    const code = document.getElementById('totp-code').value.trim();
    if (code.length !== 6) return showMsg('msg-2fa','Bitte 6-stelligen Code eingeben','error');
    try {
      const res = await fetch(API+'/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username:pendingUser, password:pendingPass, totp_code:code}) });
      const data = await res.json();
      if (!res.ok) return showMsg('msg-2fa', data.detail||'Ungueltiger Code','error');
      localStorage.setItem('token', data.token);
      localStorage.setItem('username', data.username);
      window.location.href = 'index.html';
    } catch(e) { showMsg('msg-2fa','Server nicht erreichbar','error'); }
  }
  async function register() {
    const user=document.getElementById('r-user').value.trim(), email=document.getElementById('r-email').value.trim();
    const pass=document.getElementById('r-pass').value, pass2=document.getElementById('r-pass2').value;
    if (!user||!email||!pass) return showMsg('msg-auth','Bitte alle Felder ausfullen.','error');
    if (pass!==pass2) return showMsg('msg-auth','Passwoerter stimmen nicht ueberein.','error');
    if (pass.length<8) return showMsg('msg-auth','Passwort muss mindestens 8 Zeichen haben.','error');
    try {
      const res = await fetch(API+'/register', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username:user, email, password:pass}) });
      const data = await res.json();
      if (!res.ok) return showMsg('msg-auth', data.detail||'Fehler','error');
      showMsg('msg-auth','Registrierung erfolgreich! Du kannst dich jetzt einloggen.','success');
      switchTab('login');
    } catch(e) { showMsg('msg-auth','Server nicht erreichbar','error'); }
  }
  document.addEventListener('keydown', e => {
    if (e.key==='Enter') {
      if (document.getElementById('step-2fa').classList.contains('active')) login2fa();
      else if (document.getElementById('form-login').style.display!=='none') login();
      else register();
    }
  });
  if (localStorage.getItem('token')) window.location.href = 'index.html';
</script>
</body>
</html>
